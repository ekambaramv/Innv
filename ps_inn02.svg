<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#F0F4F8"/>
  <rect x="0" y="0" width="1280" height="130" fill="#0D1B2A"/>
  <rect x="0" y="0" width="14" height="130" fill="#0D9488"/>
  <rect x="26" y="14" width="116" height="26" rx="13" fill="#0D9488"/>
  <text x="84" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">INN-02  |  Problem</text>
  <text x="26" y="72" font-size="30" font-weight="700" fill="#FFFFFF">CI/CD Security AI-Agent — Jenkins + SonarQube</text>
  <text x="26" y="106" font-size="14" fill="#B0C4D8" font-style="italic">Code issues are found by SonarQube but fixes are slow, unowned, and unguided — piling up as technical debt.</text>
  <rect x="1100" y="14" width="166" height="104" rx="10" fill="#0D9488"/>
  <text x="1183" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">INN-02</text>
  <text x="1183" y="72" text-anchor="middle" font-size="11" fill="#CCFDF5">All Jenkins Pipelines</text>
  <text x="1183" y="92" text-anchor="middle" font-size="11" fill="#CCFDF5">Quick Share · Camera</text>
  <text x="1183" y="112" text-anchor="middle" font-size="11" fill="#CCFDF5">All 4 Engineers</text>

  <!-- Card 1: Problem Statement -->
  <rect x="18" y="146" width="600" height="258" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="18" y="146" width="600" height="46" rx="10" fill="#DC2626"/>
  <rect x="18" y="170" width="600" height="22" fill="#DC2626"/>
  <text x="38" y="174" font-size="15" font-weight="700" fill="#FFFFFF">🔴  Problem Statement</text>
  <text x="38" y="214" font-size="13" font-weight="600" fill="#1E293B">SonarQube finds issues. Nobody fixes them fast enough.</text>
  <text x="38" y="236" font-size="12" fill="#475569">Jenkins pipelines run SonarQube scans, which generate lists</text>
  <text x="38" y="254" font-size="12" fill="#475569">of bugs, vulnerabilities, code smells, and security hotspots.</text>
  <text x="38" y="272" font-size="12" fill="#475569">But the scan results sit on a dashboard that developers rarely</text>
  <text x="38" y="290" font-size="12" fill="#475569">check. There is no automatic alert to the author, no suggested</text>
  <text x="38" y="308" font-size="12" fill="#475569">fix, and no enforcement — so BLOCKER issues accumulate</text>
  <text x="38" y="326" font-size="12" fill="#475569">across releases until a manual audit forces action.</text>
  <text x="38" y="354" font-size="11" fill="#DC2626" font-weight="600">Result: Security debt grows sprint over sprint. CRITICAL issues</text>
  <text x="38" y="370" font-size="11" fill="#DC2626" font-weight="600">reach production because there is no automated gate or guidance.</text>
  <text x="38" y="396" font-size="10" fill="#94A3B8" font-style="italic">Affects: All Jenkins-based CI/CD pipelines — Camera, Quick Share, Bixby, DPI</text>

  <!-- Card 2: Current Challenges -->
  <rect x="634" y="146" width="628" height="258" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="634" y="146" width="628" height="46" rx="10" fill="#EA580C"/>
  <rect x="634" y="170" width="628" height="22" fill="#EA580C"/>
  <text x="654" y="174" font-size="15" font-weight="700" fill="#FFFFFF">⚠  Current Challenges</text>

  <rect x="650" y="204" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="217" font-size="11" font-weight="700" fill="#EA580C">SonarQube dashboard is passive — nobody is watching</text>
  <text x="662" y="232" font-size="10" fill="#7C2D12">Issues are logged but no alert reaches the developer who wrote the code</text>

  <rect x="650" y="244" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="257" font-size="11" font-weight="700" fill="#EA580C">No automated fix guidance for developers</text>
  <text x="662" y="272" font-size="10" fill="#7C2D12">Developers see "Null pointer dereference" but don't know where to start fixing</text>

  <rect x="650" y="284" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="297" font-size="11" font-weight="700" fill="#EA580C">BLOCKER / CRITICAL issues don't block the build</text>
  <text x="662" y="312" font-size="10" fill="#7C2D12">Pipeline proceeds to deploy even with unresolved critical vulnerabilities</text>

  <rect x="650" y="324" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="337" font-size="11" font-weight="700" fill="#EA580C">Issue ownership is unclear</text>
  <text x="662" y="352" font-size="10" fill="#7C2D12">SonarQube shows file + line but nobody knows which team member is responsible</text>

  <rect x="650" y="364" width="590" height="28" rx="6" fill="#FFF7ED"/>
  <text x="662" y="377" font-size="11" font-weight="700" fill="#EA580C">Security hotspots treated same as minor style issues</text>
  <text x="662" y="391" font-size="10" fill="#7C2D12">No severity-based SLA — hardcoded credentials sit unresolved for weeks</text>

  <!-- Card 3: Why We Need This -->
  <rect x="18" y="416" width="600" height="256" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="18" y="416" width="600" height="46" rx="10" fill="#0D9488"/>
  <rect x="18" y="440" width="600" height="22" fill="#0D9488"/>
  <text x="38" y="444" font-size="15" font-weight="700" fill="#FFFFFF">💡  Why We Need This Solution</text>

  <rect x="30" y="474" width="14" height="14" rx="3" fill="#0D9488"/>
  <text x="52" y="486" font-size="12" font-weight="600" fill="#1E293B">AI explains the issue in plain language with a fix</text>
  <text x="52" y="502" font-size="11" fill="#475569">Developer receives a Slack DM: what the issue is, why it matters, and how to fix it</text>

  <rect x="30" y="516" width="14" height="14" rx="3" fill="#0D9488"/>
  <text x="52" y="528" font-size="12" font-weight="600" fill="#1E293B">BLOCKER issues automatically block the build</text>
  <text x="52" y="544" font-size="11" fill="#475569">Quality gate enforced — CRITICAL and BLOCKER issues must be resolved to proceed</text>

  <rect x="30" y="558" width="14" height="14" rx="3" fill="#0D9488"/>
  <text x="52" y="570" font-size="12" font-weight="600" fill="#1E293B">Alert routed to the exact code author via git blame</text>
  <text x="52" y="586" font-size="11" fill="#475569">No ambiguity — the person who wrote line 142 gets the fix suggestion directly</text>

  <rect x="30" y="600" width="14" height="14" rx="3" fill="#0D9488"/>
  <text x="52" y="612" font-size="12" font-weight="600" fill="#1E293B">Auto-fix PR raised for well-understood patterns</text>
  <text x="52" y="628" font-size="11" fill="#475569">Null checks, unused imports, simple refactors — AI raises the PR, dev just reviews</text>

  <rect x="30" y="642" width="14" height="14" rx="3" fill="#0D9488"/>
  <text x="52" y="654" font-size="12" font-weight="600" fill="#1E293B">SLA enforced by severity — CRITICAL fix within 24h</text>
  <text x="52" y="670" font-size="11" fill="#475569">Escalates to team lead if SLA is breached — no issue falls through the cracks</text>

  <!-- Card 4: Who Benefits -->
  <rect x="634" y="416" width="628" height="256" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="634" y="416" width="628" height="46" rx="10" fill="#16A34A"/>
  <rect x="634" y="440" width="628" height="22" fill="#16A34A"/>
  <text x="654" y="444" font-size="15" font-weight="700" fill="#FFFFFF">✅  Who Benefits</text>

  <rect x="646" y="474" width="100" height="28" rx="14" fill="#0D9488"/>
  <text x="696" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Developers</text>
  <text x="756" y="488" font-size="12" font-weight="600" fill="#1E293B">Get actionable fix hints, not just error codes</text>
  <text x="756" y="504" font-size="11" fill="#475569">No need to read SonarQube docs to understand what to fix</text>

  <rect x="646" y="514" width="100" height="28" rx="14" fill="#0891B2"/>
  <text x="696" y="533" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Tech Leads</text>
  <text x="756" y="528" font-size="12" font-weight="600" fill="#1E293B">Automatic escalation on SLA breach</text>
  <text x="756" y="544" font-size="11" fill="#475569">Full visibility of unresolved issues per team, per sprint</text>

  <rect x="646" y="554" width="100" height="28" rx="14" fill="#7C3AED"/>
  <text x="696" y="573" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">QA / Security</text>
  <text x="756" y="568" font-size="12" font-weight="600" fill="#1E293B">CRITICAL issues never reach production</text>
  <text x="756" y="584" font-size="11" fill="#475569">Build gate ensures minimum quality bar is enforced every run</text>

  <rect x="646" y="594" width="100" height="28" rx="14" fill="#EA580C"/>
  <text x="696" y="613" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Management</text>
  <text x="756" y="608" font-size="12" font-weight="600" fill="#1E293B">Measurable reduction in security debt over time</text>
  <text x="756" y="624" font-size="11" fill="#475569">Sprint-over-sprint trend report: issues raised vs resolved</text>

  <rect x="646" y="634" width="100" height="28" rx="14" fill="#16A34A"/>
  <text x="696" y="653" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">CI Pipeline</text>
  <text x="756" y="648" font-size="12" font-weight="600" fill="#1E293B">Faster feedback loop — issues caught at commit</text>
  <text x="756" y="664" font-size="11" fill="#475569">Not discovered weeks later during code review or staging</text>

  <rect x="0" y="698" width="1280" height="22" fill="#0D1B2A"/>
  <text x="640" y="714" text-anchor="middle" font-size="10" fill="#B0C4D8">Samsung R&amp;D Institute India  |  DevInfra Innovations 2026  |  INN-02 Problem Statement</text>
</svg>
