<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1280" height="720" fill="#F0F4F8"/>

  <!-- ── Header ── -->
  <rect x="0" y="0" width="1280" height="136" fill="#0D1B2A"/>
  <rect x="0" y="0" width="14" height="136" fill="#7C3AED"/>

  <!-- Badge -->
  <rect x="26" y="14" width="90" height="26" rx="13" fill="#7C3AED"/>
  <text x="71" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">INN-03</text>

  <!-- Title -->
  <text x="26" y="74" font-size="32" font-weight="700" fill="#FFFFFF">AI Powered Log Intelligence</text>
  <text x="26" y="108" font-size="14" fill="#B0C4D8" font-style="italic">Detect abnormality, predict failures and alert teams with suggested solutions — before things break.</text>

  <!-- Info badge top right -->
  <rect x="1090" y="14" width="176" height="108" rx="10" fill="#7C3AED"/>
  <text x="1178" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">INN-03</text>
  <text x="1178" y="66" text-anchor="middle" font-size="11" fill="#DDD6FE">K8s Events · App Containers</text>
  <text x="1178" y="84" text-anchor="middle" font-size="11" fill="#DDD6FE">Pattern Matching · Root Cause</text>
  <text x="1178" y="104" text-anchor="middle" font-size="11" fill="#DDD6FE">All 4 Eng  |  By June</text>

  <!-- ══════════════════════════════════════════════
       CARD 1 — What Is the Problem?  (top-left)
  ══════════════════════════════════════════════ -->
  <rect x="18" y="150" width="610" height="260" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- card header -->
  <rect x="18" y="150" width="610" height="48" rx="10" fill="#DC2626"/>
  <rect x="18" y="176" width="610" height="22" fill="#DC2626"/>
  <text x="38" y="168" font-size="15" font-weight="700" fill="#FFFFFF">🔴  What Is the Problem?</text>
  <text x="38" y="186" font-size="11" fill="#FECACA">Failures are found only after something breaks — logs are never read proactively.</text>

  <!-- body -->
  <text x="38" y="218" font-size="13" font-weight="600" fill="#1E293B">Kubernetes events and app container logs generate</text>
  <text x="38" y="238" font-size="13" font-weight="600" fill="#1E293B">thousands of lines every day — but no one is watching.</text>

  <text x="38" y="266" font-size="12" fill="#475569">Warning signs like memory spikes, repeated crash loops and</text>
  <text x="38" y="284" font-size="12" fill="#475569">error bursts appear in logs well before a service actually fails.</text>
  <text x="38" y="302" font-size="12" fill="#475569">But engineers only open logs after getting a complaint or an</text>
  <text x="38" y="320" font-size="12" fill="#475569">alert about a broken build or a crashed pod. By that point,</text>
  <text x="38" y="338" font-size="12" fill="#475569">time has already been lost and the damage is done.</text>

  <!-- impact callout -->
  <rect x="30" y="356" width="582" height="42" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="46" y="373" font-size="12" font-weight="700" fill="#DC2626">💥  The impact today:</text>
  <text x="46" y="391" font-size="11" fill="#7F1D1D">Long hours spent digging through logs manually + failures that could have been prevented.</text>

  <!-- ══════════════════════════════════════════════
       CARD 2 — What Is Happening Right Now?  (top-right)
  ══════════════════════════════════════════════ -->
  <rect x="646" y="150" width="616" height="260" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="646" y="150" width="616" height="48" rx="10" fill="#EA580C"/>
  <rect x="646" y="176" width="616" height="22" fill="#EA580C"/>
  <text x="666" y="168" font-size="15" font-weight="700" fill="#FFFFFF">⚠  What Is Happening Right Now?</text>
  <text x="666" y="186" font-size="11" fill="#FED7AA">Logs are collected but nobody is analysing them in real time.</text>

  <!-- challenge items -->
  <rect x="660" y="202" width="586" height="38" rx="6" fill="#FFF7ED"/>
  <text x="700" y="217" font-size="12" font-weight="700" fill="#EA580C">Logs are stored but never actively monitored</text>
  <text x="700" y="233" font-size="11" fill="#7C2D12">K8s events and app container logs pile up — no tool scans them for early warning signs</text>
  <text x="666" y="218" font-size="18" fill="#EA580C">①</text>

  <rect x="660" y="246" width="586" height="38" rx="6" fill="#FFF7ED"/>
  <text x="700" y="261" font-size="12" font-weight="700" fill="#EA580C">Engineers investigate only after something already failed</text>
  <text x="700" y="277" font-size="11" fill="#7C2D12">By the time someone looks at logs, 30–60 minutes of downtime or build time is already lost</text>
  <text x="666" y="262" font-size="18" fill="#EA580C">②</text>

  <rect x="660" y="290" width="586" height="38" rx="6" fill="#FFF7ED"/>
  <text x="700" y="305" font-size="12" font-weight="700" fill="#EA580C">The same failures keep happening with no memory</text>
  <text x="700" y="321" font-size="11" fill="#7C2D12">OOMKilled pods, crash loops, connection errors — repeat incidents nobody tracks as patterns</text>
  <text x="666" y="306" font-size="18" fill="#EA580C">③</text>

  <rect x="660" y="334" width="586" height="38" rx="6" fill="#FFF7ED"/>
  <text x="700" y="349" font-size="12" font-weight="700" fill="#EA580C">Finding the root cause takes hours of manual work</text>
  <text x="700" y="365" font-size="11" fill="#7C2D12">Senior engineers spend 2–4 hours per incident reading logs across pods and containers</text>
  <text x="666" y="350" font-size="18" fill="#EA580C">④</text>

  <rect x="660" y="378" width="586" height="24" rx="6" fill="#FFF7ED"/>
  <text x="700" y="393" font-size="11" font-weight="700" fill="#EA580C">No alert is sent to the right person with a suggested fix</text>
  <text x="666" y="394" font-size="18" fill="#EA580C">⑤</text>

  <!-- ══════════════════════════════════════════════
       CARD 3 — How Does Our Solution Fix This?  (bottom-left)
  ══════════════════════════════════════════════ -->
  <rect x="18" y="424" width="610" height="262" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="18" y="424" width="610" height="48" rx="10" fill="#7C3AED"/>
  <rect x="18" y="450" width="610" height="22" fill="#7C3AED"/>
  <text x="38" y="442" font-size="15" font-weight="700" fill="#FFFFFF">💡  How Does Our Solution Fix This?</text>
  <text x="38" y="460" font-size="11" fill="#DDD6FE">An AI agent reads every log, spots patterns and alerts the right person with a fix — automatically.</text>

  <!-- fix items -->
  <rect x="30" y="478" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="52" y="490" font-size="12" font-weight="600" fill="#1E293B">It reads Kubernetes events and app container logs continuously</text>
  <text x="52" y="507" font-size="11" fill="#475569">Every log line from K8s events and app containers is fed into the AI agent in real time</text>

  <rect x="30" y="520" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="52" y="532" font-size="12" font-weight="600" fill="#1E293B">It matches known failure patterns from a built-in library</text>
  <text x="52" y="549" font-size="11" fill="#475569">OOMKilled, crash loops, connection timeouts — recognised instantly by the pattern matching engine</text>

  <rect x="30" y="562" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="52" y="574" font-size="12" font-weight="600" fill="#1E293B">It explains the root cause in plain English using an LLM</text>
  <text x="52" y="591" font-size="11" fill="#475569">Instead of a raw error code, the team gets: "Pod crashed because memory limit 512Mi was exceeded"</text>

  <rect x="30" y="604" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="52" y="616" font-size="12" font-weight="600" fill="#1E293B">It sends a mail alert to the right team with a suggested fix</text>
  <text x="52" y="633" font-size="11" fill="#475569">The alert email includes what happened, which pod/service is affected and what to do next</text>

  <rect x="30" y="646" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="52" y="658" font-size="12" font-weight="600" fill="#1E293B">It predicts failures before they happen</text>
  <text x="52" y="675" font-size="11" fill="#475569">Rising error trends and memory growth patterns are flagged early — not after the crash</text>

  <!-- ══════════════════════════════════════════════
       CARD 4 — Who Gets the Most Out of This?  (bottom-right)
  ══════════════════════════════════════════════ -->
  <rect x="646" y="424" width="616" height="262" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="646" y="424" width="616" height="48" rx="10" fill="#16A34A"/>
  <rect x="646" y="450" width="616" height="22" fill="#16A34A"/>
  <text x="666" y="442" font-size="15" font-weight="700" fill="#FFFFFF">🎯  Who Gets the Most Out of This?</text>
  <text x="666" y="460" font-size="11" fill="#DCFCE7">Every team that runs services on Kubernetes or app containers benefits directly.</text>

  <!-- beneficiary rows -->
  <rect x="658" y="480" width="590" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="658" y="480" width="100" height="44" rx="8" fill="#7C3AED"/>
  <text x="708" y="497" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">On-Call</text>
  <text x="708" y="513" text-anchor="middle" font-size="10" fill="#DDD6FE">Engineers</text>
  <text x="772" y="497" font-size="12" font-weight="600" fill="#1E293B">Get alerted early — before users are impacted</text>
  <text x="772" y="513" font-size="11" fill="#475569">Mail alert arrives with root cause and fix suggestion — no manual log digging needed</text>

  <rect x="658" y="530" width="590" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="658" y="530" width="100" height="44" rx="8" fill="#0891B2"/>
  <text x="708" y="548" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Dev</text>
  <text x="708" y="564" text-anchor="middle" font-size="10" fill="#CDEEF8">Teams</text>
  <text x="772" y="547" font-size="12" font-weight="600" fill="#1E293B">Failures explained clearly — not just error codes</text>
  <text x="772" y="563" font-size="11" fill="#475569">Plain English summary of what failed and why, sent directly to the responsible team</text>

  <rect x="658" y="580" width="590" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="658" y="580" width="100" height="44" rx="8" fill="#0D9488"/>
  <text x="708" y="598" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Infra</text>
  <text x="708" y="614" text-anchor="middle" font-size="10" fill="#CCFDF5">Team</text>
  <text x="772" y="597" font-size="12" font-weight="600" fill="#1E293B">See recurring issues before they become incidents</text>
  <text x="772" y="613" font-size="11" fill="#475569">Pattern library grows over time — repeat failures get faster and smarter responses</text>

  <rect x="658" y="630" width="590" height="44" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="658" y="630" width="100" height="44" rx="8" fill="#F97316"/>
  <text x="708" y="648" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Management</text>
  <text x="708" y="664" text-anchor="middle" font-size="10" fill="#FED7AA">&amp; Leadership</text>
  <text x="772" y="647" font-size="12" font-weight="600" fill="#1E293B">Fewer incidents, faster recovery, measurable improvement</text>
  <text x="772" y="663" font-size="11" fill="#475569">MTTD and MTTR metrics tracked and reported — visible reduction month over month</text>

  <!-- Footer -->
  <rect x="0" y="700" width="1280" height="20" fill="#0D1B2A"/>
  <text x="640" y="714" text-anchor="middle" font-size="10" fill="#B0C4D8">Samsung R&amp;D Institute India  |  DevInfra Innovations 2026  |  INN-03  AI Powered Log Intelligence</text>

</svg>
