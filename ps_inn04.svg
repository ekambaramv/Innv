<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1280" height="720" fill="#F0F4F8"/>
  <rect x="0" y="0" width="1280" height="130" fill="#0D1B2A"/>
  <rect x="0" y="0" width="14" height="130" fill="#F97316"/>
  <rect x="26" y="14" width="116" height="26" rx="13" fill="#F97316"/>
  <text x="84" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">INN-04  |  Problem</text>
  <text x="26" y="72" font-size="30" font-weight="700" fill="#FFFFFF">AI-Powered Cloud Security &amp; Compliance Gate</text>
  <text x="26" y="106" font-size="14" fill="#B0C4D8" font-style="italic">Terraform scripts are deployed without security validation — misconfigurations reach cloud infrastructure silently.</text>
  <rect x="1100" y="14" width="166" height="104" rx="10" fill="#F97316"/>
  <text x="1183" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">INN-04</text>
  <text x="1183" y="72" text-anchor="middle" font-size="11" fill="#FED7AA">All Terraform Repos</text>
  <text x="1183" y="92" text-anchor="middle" font-size="11" fill="#FED7AA">AKS · EKS · Azure · AWS</text>
  <text x="1183" y="112" text-anchor="middle" font-size="11" fill="#FED7AA">All 4 Engineers</text>

  <!-- Card 1: Problem Statement -->
  <rect x="18" y="146" width="600" height="258" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="18" y="146" width="600" height="46" rx="10" fill="#DC2626"/>
  <rect x="18" y="170" width="600" height="22" fill="#DC2626"/>
  <text x="38" y="174" font-size="15" font-weight="700" fill="#FFFFFF">🔴  Problem Statement</text>
  <text x="38" y="214" font-size="13" font-weight="600" fill="#1E293B">Insecure Terraform goes to cloud. No one checks it first.</text>
  <text x="38" y="236" font-size="12" fill="#475569">Engineers write Terraform scripts to provision cloud resources</text>
  <text x="38" y="254" font-size="12" fill="#475569">on AKS, EKS, and Azure. These scripts are reviewed for</text>
  <text x="38" y="272" font-size="12" fill="#475569">functionality but not for security — public storage buckets,</text>
  <text x="38" y="290" font-size="12" fill="#475569">unencrypted disks, open security groups, hardcoded secrets,</text>
  <text x="38" y="308" font-size="12" fill="#475569">and wildcard IAM permissions are routinely merged and</text>
  <text x="38" y="326" font-size="12" fill="#475569">applied to production cloud environments without detection.</text>
  <text x="38" y="354" font-size="11" fill="#DC2626" font-weight="600">Result: Security misconfigurations live in cloud infra until an</text>
  <text x="38" y="370" font-size="11" fill="#DC2626" font-weight="600">audit or incident forces a costly emergency remediation.</text>
  <text x="38" y="396" font-size="10" fill="#94A3B8" font-style="italic">Affects: All cloud provisioning — AKS clusters, EKS node groups, Azure storage, AWS RDS</text>

  <!-- Card 2: Current Challenges -->
  <rect x="634" y="146" width="628" height="258" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="634" y="146" width="628" height="46" rx="10" fill="#EA580C"/>
  <rect x="634" y="170" width="628" height="22" fill="#EA580C"/>
  <text x="654" y="174" font-size="15" font-weight="700" fill="#FFFFFF">⚠  Current Challenges</text>

  <rect x="650" y="204" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="217" font-size="11" font-weight="700" fill="#EA580C">No automated security scan on Terraform PRs</text>
  <text x="662" y="232" font-size="10" fill="#7C2D12">PRs are reviewed for logic only — security rules checked manually if at all</text>

  <rect x="650" y="244" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="257" font-size="11" font-weight="700" fill="#EA580C">Internal security guidelines exist but are not enforced</text>
  <text x="662" y="272" font-size="10" fill="#7C2D12">Policy docs say "no public S3 buckets" but nothing in the pipeline enforces it</text>

  <rect x="650" y="284" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="297" font-size="11" font-weight="700" fill="#EA580C">Misconfigurations found post-deployment during audits</text>
  <text x="662" y="312" font-size="10" fill="#7C2D12">Open ingress rules and unencrypted volumes discovered weeks after apply</text>

  <rect x="650" y="324" width="590" height="34" rx="6" fill="#FFF7ED"/>
  <text x="662" y="337" font-size="11" font-weight="700" fill="#EA580C">No tagging enforcement — cost attribution is broken</text>
  <text x="662" y="352" font-size="10" fill="#7C2D12">Resources deployed without team/env/cost-center tags; FinOps cannot track spend</text>

  <rect x="650" y="364" width="590" height="28" rx="6" fill="#FFF7ED"/>
  <text x="662" y="377" font-size="11" font-weight="700" fill="#EA580C">No difference between staging and production guardrails</text>
  <text x="662" y="391" font-size="10" fill="#7C2D12">Same lax Terraform flow applies to prod — one mistake can expose production data</text>

  <!-- Card 3: Why We Need This -->
  <rect x="18" y="416" width="600" height="256" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="18" y="416" width="600" height="46" rx="10" fill="#F97316"/>
  <rect x="18" y="440" width="600" height="22" fill="#F97316"/>
  <text x="38" y="444" font-size="15" font-weight="700" fill="#FFFFFF">💡  Why We Need This Solution</text>

  <rect x="30" y="474" width="14" height="14" rx="3" fill="#F97316"/>
  <text x="52" y="486" font-size="12" font-weight="600" fill="#1E293B">Catch misconfigurations before they reach cloud</text>
  <text x="52" y="502" font-size="11" fill="#475569">AI + OPA gate on every Terraform PR — blocks deploy if rules violated</text>

  <rect x="30" y="516" width="14" height="14" rx="3" fill="#F97316"/>
  <text x="52" y="528" font-size="12" font-weight="600" fill="#1E293B">Internal security guidelines become automated rules</text>
  <text x="52" y="544" font-size="11" fill="#475569">Policies written once in OPA Rego — enforced on every PR forever</text>

  <rect x="30" y="558" width="14" height="14" rx="3" fill="#F97316"/>
  <text x="52" y="570" font-size="12" font-weight="600" fill="#1E293B">AI explains the violation and how to fix it</text>
  <text x="52" y="586" font-size="11" fill="#475569">Developer gets: "Line 23: S3 bucket is public. Change acl to 'private'" — not just a policy code</text>

  <rect x="30" y="600" width="14" height="14" rx="3" fill="#F97316"/>
  <text x="52" y="612" font-size="12" font-weight="600" fill="#1E293B">Compliance audit trail generated automatically</text>
  <text x="52" y="628" font-size="11" fill="#475569">Every PR scan result logged — audit report ready at any time without manual work</text>

  <rect x="30" y="642" width="14" height="14" rx="3" fill="#F97316"/>
  <text x="52" y="654" font-size="12" font-weight="600" fill="#1E293B">Shift-left security — fix cost drops 100x vs post-deploy</text>
  <text x="52" y="670" font-size="11" fill="#475569">Fixing a misconfiguration at PR is minutes; fixing post-production is days + risk</text>

  <!-- Card 4: Who Benefits -->
  <rect x="634" y="416" width="628" height="256" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="634" y="416" width="628" height="46" rx="10" fill="#16A34A"/>
  <rect x="634" y="440" width="628" height="22" fill="#16A34A"/>
  <text x="654" y="444" font-size="15" font-weight="700" fill="#FFFFFF">✅  Who Benefits</text>

  <rect x="646" y="474" width="106" height="28" rx="14" fill="#F97316"/>
  <text x="699" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Cloud Eng Team</text>
  <text x="762" y="488" font-size="12" font-weight="600" fill="#1E293B">Instant feedback on every Terraform PR</text>
  <text x="762" y="504" font-size="11" fill="#475569">No waiting for manual review to find security issues</text>

  <rect x="646" y="514" width="106" height="28" rx="14" fill="#DC2626"/>
  <text x="699" y="533" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Security Team</text>
  <text x="762" y="528" font-size="12" font-weight="600" fill="#1E293B">Policies enforced 24/7 without manual reviews</text>
  <text x="762" y="544" font-size="11" fill="#475569">Focus shifts from gatekeeping to policy writing and tuning</text>

  <rect x="646" y="554" width="106" height="28" rx="14" fill="#0891B2"/>
  <text x="699" y="573" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Infra / DevOps</text>
  <text x="762" y="568" font-size="12" font-weight="600" fill="#1E293B">Consistent guardrails across AKS, EKS, Azure</text>
  <text x="762" y="584" font-size="11" fill="#475569">Same policy engine covers all cloud providers and all repos</text>

  <rect x="646" y="594" width="106" height="28" rx="14" fill="#7C3AED"/>
  <text x="699" y="613" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">FinOps / Mgmt</text>
  <text x="762" y="608" font-size="12" font-weight="600" fill="#1E293B">Tagging enforced — cost attribution restored</text>
  <text x="762" y="624" font-size="11" fill="#475569">Every cloud resource tagged at creation; no orphaned spend</text>

  <rect x="646" y="634" width="106" height="28" rx="14" fill="#16A34A"/>
  <text x="699" y="653" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Compliance</text>
  <text x="762" y="648" font-size="12" font-weight="600" fill="#1E293B">Audit-ready report generated on demand</text>
  <text x="762" y="664" font-size="11" fill="#475569">Full history of every PR scan — PASS / WARN / BLOCK logged</text>

  <rect x="0" y="698" width="1280" height="22" fill="#0D1B2A"/>
  <text x="640" y="714" text-anchor="middle" font-size="10" fill="#B0C4D8">Samsung R&amp;D Institute India  |  DevInfra Innovations 2026  |  INN-04 Problem Statement</text>
</svg>
